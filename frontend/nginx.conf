server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This line is the magic. If a file isn't found, 
        # it falls back to index.html so React Router can handle it.
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the hidden backend container
    location /api/ {
        # Strip the /api prefix before sending to backend
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:7643;
        
        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for streaming (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}